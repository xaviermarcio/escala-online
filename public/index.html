<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Escala · La Rose</title>
  <meta name="description" content="Consulte sua escala — La Rose Hortifruti">
  <meta name="theme-color" content="#1e3a8a" id="theme-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La Rose Escala">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- Store selector -->
<div id="store-screen">
  <div class="ss-card">
    <div class="ss-brand">
      <div class="ss-brand__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C9 2 7 5 7 8c0 4 5 9 5 14C12 17 17 12 17 8c0-3-2-6-5-6z"/>
        </svg>
      </div>
      <div>
        <div class="ss-brand__name">La Rose</div>
        <div class="ss-brand__sub">Hortifruti</div>
      </div>
    </div>
    <div class="ss-title">Sua escala</div>
    <div class="ss-desc">Selecione sua loja para ver os turnos do mês atual.</div>
    <div class="ss-list" id="ss-list"></div>
    <a href="admin.html" class="ss-admin-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Acesso administrativo
    </a>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <header class="header" id="app-header">
    <div class="header__inner">
      <div class="header__brand" onclick="backToStores()">
        <div class="header__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C9 2 7 5 7 8c0 4 5 9 5 14C12 17 17 12 17 8c0-3-2-6-5-6z"/>
          </svg>
        </div>
        <div>
          <div class="header__store" id="hdr-store">—</div>
          <div class="header__sub">La Rose Hortifruti</div>
        </div>
      </div>
      <div class="header__actions">
        <button class="ha-btn ha-btn--store" onclick="backToStores()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <span class="ha-lbl">Trocar loja</span>
        </button>
        <button class="ha-btn" onclick="exportPDF()" id="btn-pdf">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="ha-lbl">PDF</span>
        </button>
        <a href="admin.html" class="ha-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span class="ha-lbl">Admin</span>
        </a>
        <div class="ha-month" id="hdr-month"></div>
      </div>
    </div>
  </header>

  <main class="page" id="main">
    <div class="loading-state"><div class="spinner"></div> Carregando…</div>
  </main>

  <footer class="footer" id="app-footer">La Rose Hortifruti</footer>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
